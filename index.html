<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>CrowdCare — Sign in</title>
    <link rel="icon" href="assets/logo-mark.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="styles.css?v=22" />
  </head>
  <body class="cc-motion-flow">
    <div class="layout-backdrop" aria-hidden="true"></div>
    <div class="layout-content">
    <script>
      (function () {
        if (location.protocol === "file:") {
          document.addEventListener("DOMContentLoaded", function () {
            var d = document.createElement("div");
            d.className = "banner-warn";
            d.style.marginBottom = "1rem";
            d.innerHTML =
              "<strong>You opened this as a file on your PC.</strong> The Google button usually will not work. Use your live link (GitHub Pages) or run a local server from the CrowdCare folder, e.g. <code>npx --yes serve .</code> then open the URL it prints.";
            var g = document.getElementById("gate");
            if (g) g.insertBefore(d, g.firstChild);
            else document.body.insertBefore(d, document.body.firstChild);
          });
        }
      })();
    </script>
    <!-- Gate: (1) welcome + Start (2) Google sign-in — then navigate to app.html -->
    <div id="gate" class="gate-screen">
      <div id="gate-welcome" class="gate-welcome">
        <img
          class="gate-welcome-logo"
          src="assets/logo-mark.svg"
          width="64"
          height="64"
          alt=""
          decoding="async"
        />
        <p class="gate-welcome-name">CrowdCare</p>
        <p class="gate-welcome-tagline">Crowdfunding on <strong>Solana</strong></p>
        <button type="button" class="gate-start-btn" id="gate-start-btn">
          Start CrowdCare
        </button>
        <p class="gate-welcome-skip">
          <button type="button" class="bare" id="browse-skip-welcome">
            Browse only
          </button>
        </p>
      </div>

      <div id="gate-auth" class="gate-auth-overlay" hidden>
        <div
          class="gate-auth-modal content-shell"
          role="dialog"
          aria-modal="true"
          aria-labelledby="gate-connect-heading"
        >
          <div class="gate-auth-modal-head">
            <button type="button" class="gate-auth-back bare" id="gate-auth-close">
              ← Back
            </button>
          </div>
          <h2 id="gate-connect-heading" class="gate-connect-title">Connect Google</h2>
          <p class="gate-connect-lead">
            Sign in for a <strong>demo Solana address</strong> in this browser.
          </p>

          <div id="gate-client-setup" class="banner-warn gate-modal-banner" hidden>
            <strong>Google Sign-In:</strong> set <code>config.js</code> Web client ID + authorized origin. Not on <code>file://</code>.
          </div>

          <div class="banner-warn gate-modal-banner">
            <strong>Demo wallet</strong> — derived in-browser. Don’t fund heavily without understanding the risk.
          </div>

          <p id="gate-auth-error" class="form-error" hidden></p>

          <p class="gate-connect-label">Continue with Google</p>
          <div id="g-btn-wrap-gate" class="gate-google-row gate-google-row--modal">
            <div id="g_id_signin_gate"></div>
          </div>

          <p class="gate-skip-wrap gate-skip-centered">
            <button type="button" class="bare" id="browse-skip">
              Browse only
            </button>
          </p>
        </div>
      </div>
    </div>
    </div>

    <script src="config.js"></script>
    <script src="session.js"></script>
    <script src="campaigns.js"></script>
    <script src="app.js"></script>
    <script src="https://accounts.google.com/gsi/client" defer></script>
    <script type="module" src="home.mjs"></script>
  </body>
</html>
