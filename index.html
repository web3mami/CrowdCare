<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>CrowdCare</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <h1 class="site-title">CrowdCare</h1>
    <p class="lead">Support someone directly—send crypto to their wallet.</p>
    <p class="actions"><a href="create.html">Start a campaign</a></p>
    <h2 class="section-heading">Campaigns</h2>
    <ul class="campaign-list" id="campaign-list"></ul>
    <p class="note">
      Built-in campaigns come from <code>campaigns.js</code>. Campaigns you add
      with “Start a campaign” are saved only in <strong>this browser</strong>
      until you have a real backend.
    </p>
    <script src="campaigns.js"></script>
    <script src="app.js"></script>
    <script>
      (function () {
        var list = document.getElementById("campaign-list");
        var campaigns = window.CROWDCARE_APP.getAllCampaigns();
        campaigns.forEach(function (c) {
          var li = document.createElement("li");
          var a = document.createElement("a");
          a.href = "campaign.html?id=" + encodeURIComponent(c.id);
          var title = document.createElement("p");
          title.className = "card-title";
          title.textContent = c.title;
          var meta = document.createElement("p");
          meta.className = "meta";
          meta.textContent = "Goal: " + c.goalLabel;
          a.appendChild(title);
          a.appendChild(meta);
          li.appendChild(a);
          list.appendChild(li);
        });
      })();
    </script>
  </body>
</html>
