<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Campaign — CrowdCare</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <p class="back"><a href="index.html">← All campaigns</a></p>
    <article id="campaign-article">
      <h1 id="campaign-title"></h1>
      <div id="campaign-story"></div>
      <p class="goal" id="campaign-goal"></p>
      <p><strong>Send to this address:</strong></p>
      <div class="address-row">
        <p class="address" id="wallet-address"></p>
        <button type="button" id="copy-btn" aria-label="Copy wallet address">
          Copy address
        </button>
      </div>
      <p class="note" id="campaign-note">
        Campaigns may come from <code>campaigns.js</code> or from this browser’s
        saved list (Start a campaign).
      </p>
    </article>
    <script src="campaigns.js"></script>
    <script src="app.js"></script>
    <script>
      (function () {
        var app = window.CROWDCARE_APP;
        var params = new URLSearchParams(window.location.search);
        var id = params.get("id");
        var c = id ? app.findCampaignById(id) : null;
        if (id && !c) {
          document.body.innerHTML =
            '<div style="max-width:40rem;margin:2rem auto;padding:0 1.5rem;font-family:system-ui,sans-serif">' +
            "<p>Campaign not found.</p>" +
            '<p><a href="index.html">← All campaigns</a></p></div>';
          return;
        }
        if (!c) c = app.getAllCampaigns()[0];
        if (!c) return;

        document.title = c.title + " — CrowdCare";
        document.getElementById("campaign-title").textContent = c.title;
        var story = document.getElementById("campaign-story");
        story.innerHTML = "";
        c.body.forEach(function (text) {
          var p = document.createElement("p");
          p.textContent = text;
          story.appendChild(p);
        });
        document.getElementById("campaign-goal").innerHTML =
          "<strong>Goal:</strong> " + c.goalLabel;
        document.getElementById("wallet-address").textContent = c.wallet;

        var addr = document.getElementById("wallet-address");
        var btn = document.getElementById("copy-btn");
        var label = btn.textContent;
        btn.addEventListener("click", function () {
          var text = addr.textContent.trim();
          function done() {
            btn.textContent = "Copied!";
            setTimeout(function () {
              btn.textContent = label;
            }, 2000);
          }
          if (navigator.clipboard && navigator.clipboard.writeText) {
            navigator.clipboard.writeText(text).then(done).catch(function () {
              window.prompt("Copy this address:", text);
            });
          } else {
            window.prompt("Copy this address:", text);
          }
        });
      })();
    </script>
  </body>
</html>
