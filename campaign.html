<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Campaign — CrowdCare</title>
    <link rel="icon" href="assets/logo-mark.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="styles.css?v=12" />
  </head>
  <body>
    <div class="layout-backdrop" aria-hidden="true"></div>
    <div class="layout-content">
    <nav class="top-nav">
      <a class="brand" href="app.html">
        <img
          class="brand-mark"
          src="assets/logo-mark.svg"
          width="32"
          height="32"
          alt=""
          decoding="async"
        />
        <span class="brand-text">CrowdCare</span>
      </a>
      <div class="top-nav-links">
        <a href="create.html">Start a campaign</a>
        <a href="profile.html" id="nav-profile" hidden>Profile</a>
        <a href="index.html?signin=1" id="nav-signin">Sign in</a>
      </div>
    </nav>

    <p class="back"><a href="app.html">← All campaigns</a></p>
    <article id="campaign-article" class="content-shell">
      <h1 id="campaign-title"></h1>
      <div id="campaign-story"></div>
      <p class="goal" id="campaign-goal"></p>
      <p><strong>Send on Solana to:</strong></p>
      <div class="address-row">
        <p class="address" id="wallet-address"></p>
        <button type="button" id="copy-btn" aria-label="Copy Solana address">
          Copy address
        </button>
      </div>
      <p class="note" id="campaign-note">
        Use a Solana wallet (Phantom, Solflare, etc.). Confirm the token mint
        (e.g. USDC) and network (mainnet-beta vs devnet) before sending real
        funds.
      </p>
    </article>
    </div>
    <script src="session.js"></script>
    <script src="campaigns.js"></script>
    <script src="app.js"></script>
    <script src="nav-boot.js"></script>
    <script>
      (function () {
        var app = window.CROWDCARE_APP;
        var params = new URLSearchParams(window.location.search);
        var id = params.get("id");
        var c = id ? app.findCampaignById(id) : null;
        if (id && !c) {
          document.body.innerHTML =
            '<div class="layout-backdrop" aria-hidden="true"></div><div class="layout-content">' +
            "<p>Campaign not found.</p>" +
            '<p><a href="app.html">← All campaigns</a></p></div>';
          return;
        }
        if (!c) c = app.getAllCampaigns()[0];
        if (!c) return;

        document.title = c.title + " — CrowdCare";
        document.getElementById("campaign-title").textContent = c.title;
        var story = document.getElementById("campaign-story");
        story.innerHTML = "";
        c.body.forEach(function (text) {
          var p = document.createElement("p");
          p.textContent = text;
          story.appendChild(p);
        });
        document.getElementById("campaign-goal").innerHTML =
          "<strong>Goal:</strong> " + c.goalLabel;
        document.getElementById("wallet-address").textContent = c.wallet;

        var addr = document.getElementById("wallet-address");
        var btn = document.getElementById("copy-btn");
        var label = btn.textContent;
        btn.addEventListener("click", function () {
          var text = addr.textContent.trim();
          function done() {
            btn.textContent = "Copied!";
            setTimeout(function () {
              btn.textContent = label;
            }, 2000);
          }
          if (navigator.clipboard && navigator.clipboard.writeText) {
            navigator.clipboard.writeText(text).then(done).catch(function () {
              window.prompt("Copy this address:", text);
            });
          } else {
            window.prompt("Copy this address:", text);
          }
        });
      })();
    </script>
  </body>
</html>
